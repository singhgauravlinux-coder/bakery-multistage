apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ---------------------------------------------------------------------------
# PRODUCTION overlay - 2 replicas + real resource headroom on every service.
# Deploys here are gated by a GitHub Environment approval (see
# .github/workflows/_service-pipeline.yml) and only ever promote an image
# that already passed dev and uat.
# ---------------------------------------------------------------------------

namespace: bakery-prod

resources:
- ../../base
- ../../base/ingress

commonLabels:
  environment: production

patches:
- path: patch-ingress-host.yaml
  target:
    kind: Ingress
    name: bakery-ingress
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 384Mi
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    labelSelector: app.kubernetes.io/part-of=crumb-and-ember

images:
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage/baking-schedule-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage/baking-schedule-service
  newTag: fc7b23f
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage/cart-service
